name: vocably
description: "Vocabulary learning app - Indonesian to English with AI-powered stories"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5

  # HTTP & networking
  dio: ^5.4.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Environment / secrets
  flutter_dotenv: ^5.1.0

  # UI utilities
  flutter_animate: ^4.3.0
  google_fonts: ^6.1.0
  gap: ^3.0.1

  # DI
  get_it: ^7.6.4

  # Utils
  json_annotation: ^4.8.1
  uuid: ^4.3.3

  # Audio
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/data/
